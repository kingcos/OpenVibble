name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  apple-build:
    name: Apple build & test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: make bootstrap

      - name: SwiftPM unit tests
        run: swift test --package-path Packages/OpenVibbleKit

      - name: Build iOS app (no signing)
        run: make build

      - name: Build macOS companion (no signing)
        run: |
          xcodebuild \
            -project OpenVibble.xcodeproj \
            -scheme OpenVibbleDesktop \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  android-build:
    name: Android build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Run Android unit tests
        run: ./gradlew test
