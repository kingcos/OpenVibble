name: OpenVibble
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: '18.0'
  developmentLanguage: en
knownRegions:
  - en
  - zh-Hans
  - Base
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: kingcos.me.openvibble
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
packages:
  OpenVibbleKit:
    path: Packages/OpenVibbleKit
targets:
  OpenVibbleApp:
    type: application
    platform: iOS
    sources:
      - path: OpenVibbleApp
        excludes:
          - "Resources/BuiltinCharacters"
      - path: OpenVibbleApp/Resources/BuiltinCharacters
        type: folder
        buildPhase: resources
    dependencies:
      - package: OpenVibbleKit
        product: BridgeRuntime
      - package: OpenVibbleKit
        product: NUSPeripheral
      - package: OpenVibbleKit
        product: BuddyStorage
      - package: OpenVibbleKit
        product: BuddyProtocol
      - package: OpenVibbleKit
        product: BuddyPersona
      - package: OpenVibbleKit
        product: BuddyStats
      - package: OpenVibbleKit
        product: BuddyUI
      - target: OpenVibbleLiveActivity
        embed: true
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: OpenVibble
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: Connect to Claude Desktop as Hardware Buddy.
        INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: Connect to Claude Desktop as Hardware Buddy.
        INFOPLIST_KEY_NSMotionUsageDescription: Detect shakes and face-down gestures to animate your Buddy.
        INFOPLIST_KEY_UIBackgroundModes:
          - bluetooth-peripheral
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  OpenVibbleLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: OpenVibbleLiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kingcos.me.openvibble.liveactivity
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OpenVibbleLiveActivity/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
  OpenVibbleAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OpenVibbleAppTests
    dependencies:
      - target: OpenVibbleApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kingcos.me.openvibble.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  OpenVibbleApp:
    build:
      targets:
        OpenVibbleApp: all
        OpenVibbleAppTests: [test]
    test:
      targets:
        - OpenVibbleAppTests
