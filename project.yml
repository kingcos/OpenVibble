name: ClaudeBuddyBridge
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: '18.0'
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.kingcos.ClaudeBuddyBridge
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
targets:
  ClaudeBuddyBridgeApp:
    type: application
    platform: iOS
    sources:
      - ClaudeBuddyBridgeApp
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: Claude Buddy Bridge
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
