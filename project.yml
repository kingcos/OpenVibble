name: ClaudeBuddyBridge
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: '18.0'
  developmentLanguage: en
knownRegions:
  - en
  - zh-Hans
  - Base
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.kingcos.ClaudeBuddyBridge
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
packages:
  ClaudeBuddyKit:
    path: Packages/ClaudeBuddyKit
targets:
  ClaudeBuddyBridgeApp:
    type: application
    platform: iOS
    sources:
      - path: ClaudeBuddyBridgeApp
        excludes:
          - "Resources/BuiltinCharacters"
      - path: ClaudeBuddyBridgeApp/Resources/BuiltinCharacters
        type: folder
        buildPhase: resources
    dependencies:
      - package: ClaudeBuddyKit
        product: BridgeRuntime
      - package: ClaudeBuddyKit
        product: NUSPeripheral
      - package: ClaudeBuddyKit
        product: BuddyStorage
      - package: ClaudeBuddyKit
        product: BuddyProtocol
      - package: ClaudeBuddyKit
        product: BuddyPersona
      - package: ClaudeBuddyKit
        product: BuddyStats
      - package: ClaudeBuddyKit
        product: BuddyUI
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: Claude Buddy Bridge
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: Connect to Claude Desktop as Hardware Buddy.
        INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: Connect to Claude Desktop as Hardware Buddy.
        INFOPLIST_KEY_NSMotionUsageDescription: Detect shakes and face-down gestures to animate your Buddy.
        INFOPLIST_KEY_UIBackgroundModes:
          - bluetooth-peripheral
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ClaudeBuddyBridgeAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ClaudeBuddyBridgeAppTests
    dependencies:
      - target: ClaudeBuddyBridgeApp
schemes:
  ClaudeBuddyBridgeApp:
    build:
      targets:
        ClaudeBuddyBridgeApp: all
        ClaudeBuddyBridgeAppTests: [test]
    test:
      targets:
        - ClaudeBuddyBridgeAppTests
